<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="brand">Narrative Codes</div>
        <input type="text" id="display" disabled placeholder="0">
        <div class="buttons">
            <button class="btn-clear" onclick="cleardisplay()">C</button>
            <button class="btn-op" onclick="press('%')">%</button>
            <button class="btn-op" onclick="press('**')">x²</button>
            <button class="btn-op" onclick="press('/')">÷</button>

            <button onclick="press(7)">7</button>
            <button onclick="press(8)">8</button>
            <button onclick="press(9)">9</button>
            <button class="btn-op" onclick="press('*')">×</button>

            <button onclick="press(4)">4</button>
            <button onclick="press(5)">5</button>
            <button onclick="press(6)">6</button>
            <button class="btn-op" onclick="press('-')">−</button>

            <button onclick="press(1)">1</button>
            <button onclick="press(2)">2</button>
            <button onclick="press(3)">3</button>
            <button class="btn-op" onclick="press('+')">+</button>

            <button class="btn-zero" onclick="press(0)">0</button>
            <button onclick="press('.')">.</button>
            <button class="btn-equal" onclick="calculate()">=</button>
        </div>
        <footer>
            <p>&copy; 2026 Narrative Codes. All rights reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
